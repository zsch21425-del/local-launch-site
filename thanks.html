<style>
  :root{
    --bg:#1B1A18;--ink:#F2EFE9;--muted:#A6A093;--accent:#2AA8A8;
    --green:#6FD0CC;--radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;min-height:100svh;text-align:center;
    padding:clamp(20px,5vw,48px);
  }
  .card{
    background:#211F1C;border:1px solid rgba(242,239,233,.09);
    border-radius:var(--radius);padding:clamp(32px,5vw,56px);
    max-width:520px;width:100%;
    animation:fadeUp .7s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
  .check{
    width:64px;height:64px;border-radius:50%;background:rgba(42,168,168,.14);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;font-size:2rem;color:var(--accent);
  }
  h1{font-size:clamp(1.4rem,3vw,1.9rem);letter-spacing:-.02em;font-weight:800;margin-bottom:12px}
  p{color:var(--muted);font-size:1.02rem;line-height:1.6;margin-bottom:28px}
  .btn{
    display:inline-flex;align-items:center;gap:9px;
    padding:15px 28px;border-radius:99px;font-weight:700;font-size:.98rem;
    text-decoration:none;transition:transform .25s,box-shadow .25s;
    background:var(--accent);color:#1B1A18;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(42,168,168,.4)}
  .foot{margin-top:34px;color:var(--muted);font-size:.82rem}
  .foot a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Got it — I'll reach out soon.</h1>
  <p>You'll hear from me within 24 hours. No pressure, no contracts — just an honest conversation about what your business needs.</p>
  <a href="/" class="btn">Back to Local Launch</a>
  <div class="foot">Local Launch — Websites &amp; SEO for the Trades<br><a href="/">local-launch-site.vercel.app</a></div>
</div>
</body>
</html>
